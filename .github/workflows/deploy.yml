name: Wealth-Health Strategist CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    # Supply dummy key to bypass SDK initialization validation in non-query tests
    env:
      GOOGLE_API_KEY: "AIzaSyDummyKeyForCICDValidationOnly"

    steps:
    - name: Checkout Code Repository
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install uv Package Manager
      run: |
        curl -LsSf https://astral.sh/uv/install.sh | sh
        echo "$HOME/.local/bin" >> $GITHUB_PATH

    - name: Install Dependencies
      run: uv sync --all-extras

    - name: Run Code Style Checks (Lint)
      run: |
        uv run ruff check .

    - name: Run Python Automated Functional Tests
      run: |
        uv run pytest tests/test_orchestration.py

